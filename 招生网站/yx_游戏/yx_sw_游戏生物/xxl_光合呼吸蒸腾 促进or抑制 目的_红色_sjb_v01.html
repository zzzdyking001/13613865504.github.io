<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>е…үеҗҲе‘јеҗёи’ёи…ҫ дҝғиҝӣorжҠ‘еҲ¶</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #e6f2f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px 10px 20px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        h1 {
            color: #1a6b4a;
            font-size: clamp(1.4rem, 6vw, 2rem);
            margin-bottom: 6px;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            padding: 6px 8px;
            margin-bottom: 12px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            background: rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            backdrop-filter: blur(2px);
            font-weight: 500;
        }
        #score {
            font-weight: 700;
            color: #c0392b;
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            margin-left: 4px;
        }
        .timer {
            font-weight: 500;
            color: #2c3e50;
        }
        #time {
            font-weight: 700;
            color: #1e6f5c;
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            margin-left: 4px;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 16px;
            aspect-ratio: 4 / 4;
        }
        .card {
            background: linear-gradient(145deg, #3d7ea6, #2a5f7a);
            color: #f0f9ff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.6rem, 2.2vw, 0.9rem);
            font-weight: 500;
            line-height: 1.3;
            padding: 4px 2px;
            box-shadow: 0 6px 12px rgba(0,20,30,0.2), inset 0 -2px 4px rgba(0,0,0,0.2);
            transition: all 0.15s ease;
            cursor: pointer;
            text-align: center;
            word-break: break-word;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            border: 2px solid rgba(255,255,255,0.15);
            transform: scale(1);
            will-change: transform;
        }
        .card:active {
            transform: scale(0.96);
        }
        .card.selected {
            background: linear-gradient(145deg, #f39c12, #d68910);
            border-color: #f1c40f;
            box-shadow: 0 0 0 3px #ffe484, 0 6px 12px rgba(0,0,0,0.3);
            transform: scale(1.02);
        }
        .card.matched {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.8);
            transition: visibility 0.2s, opacity 0.2s;
        }
        /* зәўиүІзӣ®зҡ„ж ·ејҸпјҲдҝқз•ҷеҺҹи®ҫи®Ўпјү */
        .card [data-purpose] {
            color: #ff3b30 !important;
            font-weight: 700;
        }
        .card .purpose-highlight {
            color: #ff3b30 !important;
            font-weight: 700;
        }
        #restart-btn {
            padding: 14px 34px;
            background: #1e6f5c;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: clamp(1.1rem, 4.5vw, 1.4rem);
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f4a3a, 0 6px 16px rgba(0,0,0,0.2);
            transition: all 0.08s linear;
            touch-action: manipulation;
            width: fit-content;
            min-width: 160px;
            margin-top: 4px;
        }
        #restart-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f4a3a;
        }
        /* жүӢжңәе°ҸеұҸйҖӮй…Қ */
        @media (max-width: 480px) {
            #game-board {
                gap: 8px;
            }
            .card {
                border-radius: 12px;
                padding: 3px 1px;
                border-width: 1.5px;
            }
            .game-info {
                padding: 4px 12px;
                border-radius: 40px;
            }
        }
        @media (max-width: 380px) {
            #game-board {
                gap: 6px;
            }
            .card {
                border-radius: 10px;
                font-size: clamp(0.5rem, 2vw, 0.7rem);
                padding: 2px 1px;
            }
        }
        /* жЁӘеұҸжҸҗзӨәжҲ–е®үе…ЁеҢә */
        @media (orientation: landscape) and (max-height: 500px) {
            #game-board {
                max-height: 70vh;
                aspect-ratio: 4 / 3;
            }
            .card {
                font-size: clamp(0.5rem, 2vw, 0.8rem);
            }
        }
    </style>
</head>
<body>
    <h1>рҹҢҝ е…үеҗҲВ·е‘јеҗёВ·и’ёи…ҫ</h1>
    <div class="game-info">
        <span>рҹҸҶ еҫ—еҲҶ <span id="score">0</span></span>
        <span class="timer">вҸұпёҸ <span id="time">60</span>s</span>
    </div>
    <div id="game-board"></div>
    <button id="restart-btn">рҹ”„ йҮҚж–°ејҖе§Ӣ</button>

    <script>
        (function(){
            // ---------- з”ҹзү©ж•°жҚ®пјҲдҝқз•ҷеҺҹж„ҸпјҢеўһеҠ зәўиүІзӣ®зҡ„ж Үи®°пјү ----------
            const biologyData = [
                { term: "зӣ®зҡ„вҶ“йҷҚдҪҺи’ёи…ҫдҪңз”Ё", definition: "еүӘеҺ»йғЁеҲҶжһқеҸ¶" },
                { term: "зӣ®зҡ„вҶ“йҷҚдҪҺи’ёи…ҫдҪңз”Ё", definition: "йҳҙеӨ©гҖҒеӮҚжҷҡз§»ж Ҫ" },
                { term: "зӣ®зҡ„вҶ“йҷҚдҪҺи’ёи…ҫдҪңз”Ё", definition: "йҒ®йҳізҪ‘" },
                { term: "зӣ®зҡ„вҶ“жҠ‘еҲ¶е‘јеҗёдҪңз”Ё", definition: "йҷҚдҪҺжё©еәҰ" },
                { term: "зӣ®зҡ„вҶ“жҠ‘еҲ¶е‘јеҗёдҪңз”Ё", definition: "еҮҸе°‘ж°§ж°”" },
                { term: "зӣ®зҡ„вҶ“жҠ‘еҲ¶е‘јеҗёдҪңз”Ё", definition: "йҷҚдҪҺеҗ«ж°ҙйҮҸ" },
                { term: "зӣ®зҡ„вҶ‘дҝғиҝӣе‘јеҗёдҪңз”Ё", definition: "ж’ӯз§ҚеүҚжқҫеңҹ" },
                { term: "зӣ®зҡ„вҶ‘дҝғиҝӣе‘јеҗёдҪңз”Ё", definition: "з§ҚжӨҚиҠұеҚүжқҫеңҹ" },
                { term: "зӣ®зҡ„вҶ‘дҝғиҝӣе‘јеҗёдҪңз”Ё", definition: "дёҚиё©иёҸиҚүеқӘ" },
                { term: "зӣ®зҡ„вҶ‘дҝғиҝӣе‘јеҗёдҪңз”Ё", definition: "еҶңз”°йӣЁж°ҙеӨҡж—¶жҺ’ж°ҙ" },
                { term: "зӣ®зҡ„вҶ‘дҝғиҝӣе…үеҗҲдҪңз”Ё", definition: "йҖӮеҪ“еўһеҠ дәҢж°§еҢ–зўі" },
                { term: "зӣ®зҡ„вҶ‘дҝғиҝӣе…үеҗҲдҪңз”Ё", definition: "еҗҲзҗҶеҜҶжӨҚ" },
                { term: "зӣ®зҡ„вҶ‘дҝғиҝӣе…үеҗҲдҪңз”Ё", definition: "йҖӮеҪ“еўһеҠ е…үз…§" },
                { term: "зӣ®зҡ„вҶ‘дҝғиҝӣе…үеҗҲдҪңз”Ё", definition: "йҖӮеҪ“еўһеҠ ж°ҙеҲҶ" },
                { term: "зӣ®зҡ„вҶ‘дҝғиҝӣе…үеҗҲдҪңз”Ё", definition: "жҸҗдҫӣеҗҲйҖӮзҡ„жё©еәҰ" }
            ];

            // жёёжҲҸж ёеҝғеҸҳйҮҸ
            let selectedCards = [];
            let matchedPairs = 0;
            let score = 0;
            let timeLeft = 60;
            let timer = null;
            let gameActive = true;
            let lockBoard = false;   // йҳІжӯўиҝһзӮ№/еҠЁз”»жңҹй—ҙйҮҚеӨҚи§ҰеҸ‘

            const boardEl = document.getElementById('game-board');
            const scoreEl = document.getElementById('score');
            const timeEl = document.getElementById('time');
            const restartBtn = document.getElementById('restart-btn');

            // ---------- иҫ…еҠ©: е°Ҷ"зӣ®зҡ„"з”ЁзәўиүІж Үи®° (еҗҢж—¶дҝқз•ҷеҺҹdata-purposeеұһжҖ§) ----------
            function stylePurpose(term) {
                // е°Ҷ "зӣ®зҡ„вҶ“" жҲ– "зӣ®зҡ„вҶ‘" дёӯзҡ„ "зӣ®зҡ„" жӣҝжҚўдёәеёҰзәўиүІspan
                return term.replace(/(зӣ®зҡ„)([вҶ‘вҶ“])/g, (match, p1, p2) => {
                    return `<span class="purpose-highlight" data-purpose>${p1}</span>${p2}`;
                });
            }

            // ---------- еҲқе§ӢеҢ–жёёжҲҸ ----------
            function initGame() {
                // жё…йҷӨж—§и®Ўж—¶еҷЁ
                if (timer) {
                    clearInterval(timer);
                    timer = null;
                }

                // йҮҚзҪ®зҠ¶жҖҒ
                boardEl.innerHTML = '';
                selectedCards = [];
                matchedPairs = 0;
                score = 0;
                timeLeft = 60;
                gameActive = true;
                lockBoard = false;

                scoreEl.textContent = '0';
                timeEl.textContent = '60';

                // д»Һж•°жҚ®дёӯйҡҸжңәйҖү12еҜ№ (д»Һ15еҜ№дёӯйҖү12еҜ№)
                const shuffledData = [...biologyData].sort(() => 0.5 - Math.random()).slice(0, 12);

                // жһ„е»әеҚЎзүҮеҜ№ (жҜҸдёӘpairз”ҹжҲҗдёӨеј еҚЎзүҮ: term е’Ң definition)
                const gameCards = [];
                shuffledData.forEach(item => {
                    const termStyled = stylePurpose(item.term);
                    // еӯҳеӮЁзәҜж–Үжң¬з”ЁдәҺеҢ№й…ҚпјҲдҪҶдҝқз•ҷpairеҢ№й…ҚйҖ»иҫ‘дҪҝз”ЁеҺҹе§Ӣterm/definitionпјү
                    gameCards.push({
                        content: termStyled,
                        rawContent: item.term,
                        type: 'term',
                        pairKey: item.definition,   // еҢ№й…Қж—¶еҜ№жҜ” definition
                        pairRaw: item.definition
                    });
                    gameCards.push({
                        content: item.definition,
                        rawContent: item.definition,
                        type: 'definition',
                        pairKey: item.term,         // еҢ№й…Қж—¶еҜ№жҜ” term
                        pairRaw: item.term
                    });
                });

                // жҙ—зүҢ (FisherвҖ“Yates)
                for (let i = gameCards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [gameCards[i], gameCards[j]] = [gameCards[j], gameCards[i]];
                }

                // еҲӣе»әеҚЎзүҮDOM
                gameCards.forEach((cardData, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.index = index;
                    // еӯҳеӮЁеҢ№й…ҚдҫқжҚ®: дҪҝз”ЁpairKey (еҺҹе§ӢtermжҲ–definition)
                    card.dataset.pairKey = cardData.pairKey;
                    // еӯҳеӮЁиҮӘиә«еҺҹе§ӢеҶ…е®№ (з”ЁдәҺеҢ№й…Қж—¶жҜ”иҫғ)
                    card.dataset.rawContent = cardData.rawContent;
                    // еӯҳеӮЁзұ»еһӢ
                    card.dataset.type = cardData.type;

                    // жёІжҹ“еҶ…е®№ (еҢ…еҗ«зәўиүІзӣ®зҡ„)
                    card.innerHTML = cardData.content;

                    // зӮ№еҮ»дәӢд»¶
                    card.addEventListener('click', cardClickHandler);
                    boardEl.appendChild(card);
                });

                // еҗҜеҠЁи®Ўж—¶еҷЁ
                timer = setInterval(updateTimer, 1000);
            }

            // ---------- еҚЎзүҮзӮ№еҮ»еӨ„зҗҶ (йҳІиҝһзӮ№/й”Ғ) ----------
            function cardClickHandler(e) {
                const card = e.currentTarget;

                // еҗ„з§ҚзҰҒжӯўзӮ№еҮ»жқЎд»¶
                if (!gameActive) return;
                if (lockBoard) return;
                if (card.classList.contains('selected')) return;
                if (card.classList.contains('matched')) return;
                if (selectedCards.length >= 2) return;

                // йҖүдёӯеҚЎзүҮ
                card.classList.add('selected');
                selectedCards.push(card);

                // еҰӮжһңжҒ°еҘҪйҖүдәҶдёӨеј пјҢиҝӣиЎҢеҢ№й…ҚжЈҖжҹҘ
                if (selectedCards.length === 2) {
                    lockBoard = true;   // й”Ғе®ҡз•Ңйқў
                    checkMatch();
                } else {
                    // еҸӘйҖүдәҶдёҖеј пјҢи§Јй”ҒпјҲдҪҶlockBoardжң¬жқҘе°ұжҳҜfalseпјү
                    lockBoard = false;
                }
            }

            // ---------- еҢ№й…ҚжЈҖжҹҘ ----------
            function checkMatch() {
                const [card1, card2] = selectedCards;

                // еҢ№й…ҚйҖ»иҫ‘: card1зҡ„pairKey зӯүдәҺ card2зҡ„rawContent жҲ–иҖ…еҸҚиҝҮжқҘ
                const pair1 = card1.dataset.pairKey;
                const pair2 = card2.dataset.pairKey;
                const raw1 = card1.dataset.rawContent;
                const raw2 = card2.dataset.rawContent;

                // еҲӨж–ӯжҳҜеҗҰеҢ№й…Қ: (card1зҡ„pairKey === card2зҡ„raw) жҲ– (card2зҡ„pairKey === card1зҡ„raw)
                const isMatch = (pair1 === raw2) || (pair2 === raw1);

                if (isMatch) {
                    // еҢ№й…ҚжҲҗеҠҹ
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    // д»Һselectedдёӯз§»йҷӨ (е·Із»ҸеҢ№й…Қ)
                    selectedCards = [];
                    matchedPairs++;
                    score += 10;
                    scoreEl.textContent = score;

                    // и§Јй”Ғ
                    lockBoard = false;

                    // жЈҖжҹҘжҳҜеҗҰиғңеҲ©
                    if (matchedPairs === 12) {
                        gameActive = false;
                        if (timer) clearInterval(timer);
                        setTimeout(() => {
                            alert(`рҹҺү жҒӯе–ңпјҒе…ЁйғЁй…ҚеҜ№жҲҗеҠҹпјҒ\nжңҖз»Ҳеҫ—еҲҶ: ${score}`);
                        }, 300);
                    }
                } else {
                    // еҢ№й…ҚеӨұиҙҘпјҡе»¶иҝҹзҝ»еӣһ
                    gameActive = false;  // жҡӮж—¶зҰҒз”ЁзӮ№еҮ»
                    setTimeout(() => {
                        // з§»йҷӨйҖүдёӯж ·ејҸ (еҰӮжһңиҝҳжІЎиў«еҢ№й…ҚжҺү)
                        if (card1 && card1.parentNode) card1.classList.remove('selected');
                        if (card2 && card2.parentNode) card2.classList.remove('selected');
                        // жё…з©әйҖүдёӯж•°з»„
                        selectedCards = [];
                        // и§Јй”Ғе№¶жҒўеӨҚжёёжҲҸжҝҖжҙ»
                        lockBoard = false;
                        gameActive = true;
                    }, 800);
                }
            }

            // ---------- и®Ўж—¶еҷЁ ----------
            function updateTimer() {
                if (!gameActive) return; // еҰӮжһңжёёжҲҸз»“жқҹпјҢеҒңжӯўеҖ’и®Ўж—¶пјҲдҪҶи®Ўж—¶еҷЁиҝҳдјҡи·‘пјҢйҖҡиҝҮclearжҺ§еҲ¶пјү
                timeLeft--;
                timeEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    timeEl.textContent = '0';
                    gameActive = false;
                    if (timer) clearInterval(timer);
                    // еј№еҮәз»“жқҹжҸҗзӨә
                    setTimeout(() => {
                        alert(`вҸ° ж—¶й—ҙеҲ°пјҒ\nжңҖз»Ҳеҫ—еҲҶ: ${score}`);
                    }, 200);
                    // зҰҒз”ЁеҚЎзүҮзӮ№еҮ»йҖҡиҝҮgameActiveжҺ§еҲ¶пјҢж— йңҖйўқеӨ–ж“ҚдҪң
                }
            }

            // ---------- йҮҚж–°ејҖе§Ӣ ----------
            function restartGame() {
                if (timer) {
                    clearInterval(timer);
                    timer = null;
                }
                // йҮҚзҪ®жүҖжңү
                initGame();
            }

            // ---------- дәӢд»¶з»‘е®ҡ ----------
            restartBtn.addEventListener('click', restartGame);

            // йҳІжӯўжүӢжңәеҸҢеҮ»зј©ж”ҫе№Іжү° (дҪҶдҝқз•ҷ)
            document.addEventListener('dblclick', (e) => e.preventDefault());

            // еҗҜеҠЁжёёжҲҸ
            initGame();

            // йўқеӨ–: еҰӮжһңжңүеҚЎзүҮеңЁеҢ№й…ҚеӨұиҙҘж—¶иў«еҝ«йҖҹзӮ№еҮ», йҖҡиҝҮlockBoardе’ҢgameActiveеҸҢйҮҚйҳІжҠӨ
        })();
    </script>
</body>
</html>
