<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>显微镜的操作难点</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2e8b57;
            margin-bottom: 10px;
        }
        .game-info {
            margin-bottom: 20px;
            font-size: 18px;
        }
        #score {
            font-weight: bold;
            color: #ff6347;
            font-size: 24px;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 0 auto 20px;
        }
        .card {
            height: 80px;
            background-color: #4682b4;
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            padding: 5px;
            box-sizing: border-box;
            text-align: center;
        }
        .card.selected {
            background-color: #ffa500;
            transform: scale(1.05);
        }
        .card.matched {
            visibility: hidden;
        }
        #restart-btn {
            padding: 10px 20px;
            background-color: #2e8b57;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        #restart-btn:hover {
            background-color: #3cb371;
        }
        .timer {
            font-size: 20px;
            margin-bottom: 10px;
        }
        /* 新增的红色目的样式 */
        .card [data-purpose] {
            color: red;
        }
    </style>
</head>
<body>
    <h1>显微镜的操作难点</h1>
    <div class="game-info">
        <span>得分: <span id="score">0</span></span>
        <span class="timer">时间: <span id="time">60</span>秒</span>
    </div>
    <div id="game-board"></div>
    <button id="restart-btn">重新开始</button>

    <script>
        // 生物知识点配对数据
        const biologyData = [
            { term: "问题↓物镜下降时，眼睛看哪里？", definition: "物镜" },
            { term: "问题↓物镜上升时，眼睛看哪里？", definition: "目镜" },
            { term: "问题↓擦拭目镜和物镜用？", definition: "擦镜纸" },
            { term: "问题↓对光时", definition: "转动反光镜" },
            { term: "问题↓更换物镜时", definition: "转动转换器" },
            { term: "问题↓对光成功的标志？", definition: "看到明亮的视野" },
            
			{ term: "问题↓光线暗时，选择？", definition: "大光圈、凹面镜" },
            { term: "问题↓光线亮时，选择？", definition: "小光圈、平面镜" },
            { term: "问题↓目镜越长，倍数越？", definition: "低" },
            { term: "问题↓物镜越长，倍数越？", definition: "高" },
            { term: "问题↓倍数越高，细胞数量越？", definition: "少" },
            { term: "问题↓倍数越低，细胞数量越？", definition: "多" }
            /*{ term: "问题↓", definition: "适当增加水分" },
            { term: "问题↓", definition: "提供合适的温度" }
			*/
        ];

        // 游戏变量
        let selectedCards = [];
        let matchedPairs = 0;
        let score = 0;
        let timeLeft = 60;
        let timer;
        let gameActive = true;

        // 初始化游戏
        function initGame() {
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';
            selectedCards = [];
            matchedPairs = 0;
            score = 0;
            timeLeft = 60;
            gameActive = true;
            
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
            
            if (timer) clearInterval(timer);
            timer = setInterval(updateTimer, 1000);

            // 选择12对知识点(从18个中随机选择12个)
            const shuffledData = [...biologyData].sort(() => 0.5 - Math.random()).slice(0, 12);
            
            // 创建卡片对
            const gameCards = [];
            shuffledData.forEach(item => {
                // 修改term内容，将"目的"部分用span包裹并添加data-purpose属性
                const termWithStyledPurpose = item.term.replace("问题", "<span data-purpose style='color:red;'>问题</span>");
                gameCards.push({ content: termWithStyledPurpose, type: 'term', pair: item.definition });
                gameCards.push({ content: item.definition, type: 'definition', pair: item.term });
            });
            
            // 洗牌
            gameCards.sort(() => 0.5 - Math.random());
            
            // 创建卡片元素
            gameCards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.index = index;
                cardElement.dataset.content = card.content.replace(/<[^>]*>/g, ''); // 存储不带HTML标签的内容用于匹配
                cardElement.dataset.pair = card.pair;
                cardElement.innerHTML = card.content; // 使用innerHTML以渲染HTML标签
                
                cardElement.addEventListener('click', () => handleCardClick(cardElement));
                gameBoard.appendChild(cardElement);
            });
        }

        // 处理卡片点击
        function handleCardClick(card) {
            if (!gameActive || card.classList.contains('selected') || card.classList.contains('matched')) {
                return;
            }
            
            card.classList.add('selected');
            selectedCards.push(card);
            
            if (selectedCards.length === 2) {
                checkForMatch();
            }
        }

        // 检查是否匹配
        function checkForMatch() {
            const [card1, card2] = selectedCards;
            
            if (card1.dataset.pair === card2.dataset.content || card2.dataset.pair === card1.dataset.content) {
                // 匹配成功
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                score += 10;
                document.getElementById('score').textContent = score;
                
                if (matchedPairs === 12) {
                    gameActive = false;
                    clearInterval(timer);
                    setTimeout(() => alert(`恭喜！游戏胜利！最终得分: ${score}`), 500);
                }
            } else {
                // 匹配失败
                gameActive = false;
                setTimeout(() => {
                    card1.classList.remove('selected');
                    card2.classList.remove('selected');
                    gameActive = true;
                }, 1000);
            }
            
            selectedCards = [];
        }

        // 更新计时器
        function updateTimer() {
            timeLeft--;
            document.getElementById('time').textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                gameActive = false;
                alert(`时间到！最终得分: ${score}`);
            }
        }

        // 重新开始游戏
        document.getElementById('restart-btn').addEventListener('click', initGame);

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
