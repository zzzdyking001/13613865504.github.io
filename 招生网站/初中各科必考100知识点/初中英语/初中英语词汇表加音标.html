        * {

        }

        .header h1 {
            font-size: 2.6rem;
            font-weight: 600;
            color: #0b2b44;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .header h1 span {
            background: #3b8fc2;
            color: white;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            letter-spacing: 0.5px;
        }

        .subhead {
            color: #2a5778;
            font-size: 1.05rem;
            margin-top: 0.4rem;
            background: #e3edf7;
            display: inline-block;
            padding: 0.2rem 1.8rem;
            border-radius: 30px;
            backdrop-filter: blur(2px);
        }

        .alpha-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.4rem 0.25rem;
            margin: 1.8rem 0 2.5rem;
            padding: 0.4rem 0.6rem;
            background: white;
            border-radius: 60px;
            box-shadow: 0 4px 14px rgba(0, 30, 50, 0.07);
            border: 1px solid #cfe0ed;
        }

        .alpha-nav a {
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            color: #0b2b44;
            background: transparent;
            padding: 0.3rem 0.7rem;
            border-radius: 40px;
            transition: all 0.15s;
            min-width: 2rem;
            text-align: center;
            letter-spacing: 0.3px;
        }

        .alpha-nav a:hover {
            background: #3b8fc2;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 2px 10px rgba(59, 143, 194, 0.3);
        }

        .alpha-nav a:active {
            transform: scale(0.92);
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 1.2rem;
            margin-top: 0.5rem;
        }

        .word-card {
            background: white;
            border-radius: 28px;
            padding: 1.2rem 0.8rem 0.9rem;
            box-shadow: 0 6px 18px rgba(0, 20, 40, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease, box-shadow 0.25s;
            border: 1px solid rgba(200, 220, 240, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 130px;
            justify-content: center;
        }

        .word-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 14px 30px rgba(20, 60, 100, 0.08);
            border-color: #3b8fc270;
            background: #fffffffe;
        }

        .word-en {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0b2b44;
            line-height: 1.3;
            letter-spacing: -0.2px;
            word-break: break-word;
        }

        .word-phonetic {
            font-size: 1rem;
            color: #2a5778;
            background: #eaf1f9;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            margin-top: 0.15rem;
            font-family: 'Lucida Sans Unicode', 'Segoe UI', 'Arial Unicode MS', sans-serif;
            letter-spacing: 0.3px;
            border: 1px solid #c5dae9;
            display: inline-block;
            font-weight: 400;
        }

        .word-zh {
            font-size: 1rem;
            color: #1f5577;
            background: #e3edf7;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            margin-top: 0.5rem;
            display: inline-block;
            font-weight: 500;
            border: 1px solid #c5dae9;
        }

        .section-letter {
            grid-column: 1 / -1;
            margin: 1.8rem 0 0.8rem 0;
            font-size: 2.2rem;
            font-weight: 700;
            color: #0b2b44;
            background: linear-gradient(135deg, #e8f2fa 0%, #ffffff 100%);
            padding: 0.3rem 1.8rem;
            border-radius: 60px;
            display: inline-block;
            width: fit-content;
            border-left: 6px solid #3b8fc2;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            letter-spacing: 2px;
        }

        .letter-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            width: 100%;
        }

        .no-words {
            color: #3a6a8a;
            background: #e3edf7;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            grid-column: 1 / -1;
            text-align: center;
        }

            margin-top: 3.5rem;
            color: #3a6a8a;
            font-size: 0.9rem;
            border-top: 1px solid #cfe0ed;
            padding-top: 1.8rem;
            text-align: center;
            width: 100%;
            letter-spacing: 0.4px;
        }

        .footer small {
            background: #e8f2fa;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
        }

            .header h1 {
                font-size: 2rem;
            }
            .header h1 span {
                font-size: 1rem;
                padding: 0.1rem 0.8rem;
            }
            .vocab-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 0.9rem;
            }
            .word-en {
                font-size: 1.2rem;
            }
            .word-phonetic {

            }
            .alpha-nav a {
                font-size: 0.8rem;
                min-width: 1.8rem;
                padding: 0.2rem 0.4rem;
            }
            .section-letter {
                font-size: 1.8rem;
                padding: 0.2rem 1.2rem;
            }
        }

        @media (max-width: 400px) {
            .vocab-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }

        @media print {
            body { background: white; padding: 0.5rem; }
            .word-card { box-shadow: none; border: 1px solid #aaa; break-inside: avoid; }
            .alpha-nav { display: none; }
            .header h1 { color: #000; }
        }
    </style>
</head>

        // 分组 (首字母)
        function groupWordsByLetter(words) {
            const groups = {};
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                groups[letter] = [];
            }
            words.forEach(word => {
                const firstChar = word.en.charAt(0).toUpperCase();
                if (groups[firstChar]) {
                    groups[firstChar].push(word);
                } else {
                    if (!groups['#']) groups['#'] = [];
                    groups['#'].push(word);
                }
            });
            return groups;
        }

        function renderVocabulary() {
            const grid = document.getElementById('vocabGrid');
            if (!grid) return;

            const groups = groupWordsByLetter(wordList);
            const letters = Object.keys(groups).sort();

            let html = '';
            let totalWords = 0;

            letters.forEach(letter => {
                const words = groups[letter];
                if (!words || words.length === 0) return;

                const displayLetter = (letter === '#') ? '#' : letter;
                html += `<div class="letter-wrapper" id="letter-${displayLetter}">`;
                html += `<div class="section-letter">${displayLetter}</div>`;
                html += `</div>`;

                words.forEach(w => {
                    const phonetic = w.phonetic || '';
                    html += `
                        <div class="word-card">
                            <div class="word-en">${w.en}</div>
                            ${phonetic ? `<div class="word-phonetic">${phonetic}</div>` : ''}
                            <div class="word-zh">${w.zh}</div>
                        </div>
                    `;
                    totalWords++;
                });
            });

            if (totalWords === 0) {
                html = `<div class="no-words">📖 词汇表加载中，请稍后...</div>`;
            }

            grid.innerHTML = html;

            const countSpan = document.getElementById('wordCount');
            if (countSpan) {
                countSpan.textContent = totalWords;
            }
        }

        renderVocabulary();

        // 平滑滚动导航
        document.querySelectorAll('.alpha-nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                const targetId = this.getAttribute('href');
                if (targetId && targetId.startsWith('#')) {
                    const targetEl = document.querySelector(targetId);
                    if (targetEl) {
                        e.preventDefault();
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            });
        });

        console.log('📘 初中英语词汇表 (带音标) 已加载，加油！');
    })();
